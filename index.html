<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeFi Program</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="toast-container"></div>

    <div id="auth-screen" class="screen active">
        <div class="glass-panel">
            <h1 class="logo">DeFi Program</h1>
            <p class="subtitle" style="margin-bottom: 20px;">مجتمع المطورين</p>
            
            <div id="login-form" class="auth-box active-auth">
                <input type="email" id="login-email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="login-password" placeholder="كلمة المرور" required>
                <button class="primary-btn" onclick="login()">تسجيل الدخول</button>
                <p class="switch-auth">ليس لديك حساب؟ <span onclick="toggleAuth('register-form')">إنشاء حساب</span></p>
            </div>

            <div id="register-form" class="auth-box hidden-auth">
                <input type="text" id="reg-name" placeholder="الاسم" required>
                <input type="email" id="reg-email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="reg-password" placeholder="كلمة المرور" required>
                <button class="primary-btn" id="btn-register">إنشاء حساب</button>
                <p class="switch-auth">لديك حساب بالفعل؟ <span onclick="toggleAuth('login-form')">تسجيل الدخول</span></p>
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        
        <main id="content-area">
            </main>

        <nav class="bottom-nav floating-nav">
            <div class="nav-item" id="nav-profile" onclick="switchTab('profile', this)">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="nav-item" id="nav-workspace" onclick="switchTab('workspace', this)">
                <i class="fa-solid fa-code"></i>
            </div>
            <div class="nav-item center-add" onclick="showToast('سيتم إضافة المنشورات قريباً', 'info')">
                <div class="add-btn"><i class="fa-solid fa-plus"></i></div>
            </div>
            <div class="nav-item" id="nav-challenges" onclick="switchTab('challenges', this)">
                <i class="fa-solid fa-trophy"></i>
            </div>
            <div class="nav-item active" id="nav-forum" onclick="switchTab('forum', this)">
                <i class="fa-solid fa-comments"></i>
            </div>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
