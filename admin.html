<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غرفة تحكم النقيب 👑</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* تعديلات بسيطة لصفحة الأدمن */
    body { justify-content: flex-start; padding: 20px; overflow-y: auto; }
    .admin-container { width: 100%; max-width: 800px; margin: 0 auto; }
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    @media (max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="admin-container">
    <header class="top-bar" style="border-radius: 16px; margin-bottom: 20px;">
      <div class="logo"><i class="fa-solid fa-crown" style="color: var(--gold);"></i> غرفة القيادة</div>
      <a href="index.html" class="btn-danger" style="text-decoration: none; padding: 8px 15px; font-size: 0.9rem;">العودة للنقابة</a>
    </header>

    <div id="auth-check" class="text-center" style="margin-top: 50px;">
      <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--accent);"></i>
      <p class="text-muted" style="margin-top: 10px;">جاري التحقق من هويتك الملكية...</p>
    </div>

    <div id="admin-content" style="display: none;">
      
      <div class="welcome-banner" style="background: linear-gradient(135deg, #111827, #1f2937); border: 1px solid var(--gold);">
        <h2 style="color: var(--gold);">مرحباً بك يا نقيب 👑</h2>
        <p class="text-muted">من هنا يمكنك إدارة شؤون النقابة، إصدار التعاويذ، ونشر الأخبار.</p>
      </div>

      <div class="admin-grid">
        <div class="glass-card">
          <h3 class="section-title"><i class="fa-solid fa-wand-sparkles" style="color: var(--accent);"></i> توليد تعويذة (Promo Code)</h3>
          <input type="text" id="promo-code" class="chat-input" placeholder="اسم الكود (مثال: ANIME2026)" style="width: 100%; margin-bottom: 12px;">
          <input type="number" id="promo-stars" class="chat-input" placeholder="عدد النجوم (مثال: 100)" style="width: 100%; margin-bottom: 20px;">
          <button id="btn-create-promo" class="btn-primary" style="width: 100%;"><i class="fa-solid fa-plus"></i> توليد الكود</button>
        </div>

        <div class="glass-card">
          <h3 class="section-title"><i class="fa-solid fa-scroll" style="color: var(--accent);"></i> نشر إعلان بالنقابة</h3>
          <input type="text" id="news-title" class="chat-input" placeholder="عنوان الخبر (مثال: تحديث الرتب)" style="width: 100%; margin-bottom: 12px;">
          <textarea id="news-body" class="chat-input" placeholder="تفاصيل الإعلان..." style="width: 100%; height: 100px; resize: vertical; margin-bottom: 20px;"></textarea>
          <button id="btn-publish-news" class="btn-primary" style="width: 100%;"><i class="fa-solid fa-bullhorn"></i> نشر الإعلان</button>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
